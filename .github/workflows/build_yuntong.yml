name: Build 云通 APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4.0.1
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --channel=0 --install "ndk;28.2.13676358"
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore yuntong.keystore -alias yuntong \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass yuntong123 -keypass yuntong123 \
          -dname "CN=云通, OU=YunTong, O=YunTong, L=HK, ST=HK, C=HK"

    - name: Build Release APK
      run: |

        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=${{ github.workspace }}/yuntong.keystore \
          -Pandroid.injected.signing.store.password=yuntong123 \
          -Pandroid.injected.signing.key.alias=yuntong \
          -Pandroid.injected.signing.key.password=yuntong123

    - name: Upload APKs
      uses: actions/upload-artifact@v7
      with:
        name: 云通-APKs
        path: V2rayNG/app/build/outputs/apk/*/release/*.apk
